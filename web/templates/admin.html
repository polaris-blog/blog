    <script>
        const token = localStorage.getItem('token');
        let csrfToken = '';

        function getCsrfFromCookie() {
            const cookies = document.cookie.split(';');
            for (let cookie of cookies) {
                const [name, value] = cookie.trim().split('=');
                if (name === 'csrf_') {
                    return decodeURIComponent(value);
                }
            }
            return '';
        }

        async function getCsrfToken() {
            csrfToken = getCsrfFromCookie();
            if (!csrfToken) {
                try {
                    const res = await fetch('/api/csrf', {
                        headers: token ? { 'Authorization': 'Bearer ' + token } : {}
                    });
                    const data = await res.json();
                    csrfToken = data.csrf_token || getCsrfFromCookie();
                } catch (e) {
                    console.error('Failed to get CSRF token:', e);
                }
            }
            console.log('CSRF token:', csrfToken ? 'present' : 'missing');
            return csrfToken;
        }

        function app() {
            return {
                currentPage: 'dashboard',
                pageTitle: '仪表盘',
                sidebarOpen: true,
                user: null,
                stats: {},
                posts: [],
                comments: [],
                categories: [],
                tags: [],
                media: [],
                themes: [],
                themeConfigTheme: null,
                themeConfigDefs: {},
                themeConfigValues: {},
                showThemeConfig: false,
                plugins: [],
                pluginConfigPlugin: null,
                pluginConfigDefs: {},
                pluginConfigValues: {},
                showPluginConfig: false,
                settings: {},
                
                editorMode: 'post',
                postTitle: '',
                postContent: '',
                postCoverImage: '',
                postCategory: '',
                selectedTags: [],
                tagSearch: '',
                filteredTags: [],
                showTagDropdown: false,
                previewContent: '',
                editingPost: null,
                editingPage: null,
                pageSlug: '',
                pageIsInNav: false,
                pageNavSort: 0,
                
                searchKeyword: '',
                filterStatus: '',
                filterCommentStatus: '',
                filterMediaType: '',
                copiedMediaUrl: '',
                selectedComments: [],
                
                showCategoryModal: false,
                showTagModal: false,
                showNavModal: false,
                editingCategory: null,
                editingTag: null,
                editingNav: null,
                categoryForm: { name: '', description: '' },
                tagForm: { name: '' },
                navForm: { name: '', url: '', icon: '', target: '_self', sort_order: 0, parent_id: null, is_active: true },
                pages: [],
                navigations: [],

                init() {
                    getCsrfToken();
                    this.checkAuth();
                    this.loadCategories();
                    this.loadTags();
                    window.addEventListener('hashchange', () => {
                        const hash = window.location.hash.slice(2) || 'dashboard';
                        this.currentPage = hash;
                        this.updatePageTitle();
                    });
                },

                checkAuth() {
                    if (!token) {
                        window.location.href = '/login';
                        return;
                    }
                    fetch('/api/admin/dashboard', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    }).then(r => {
                        if (r.status === 401 || r.status === 403) {
                            localStorage.removeItem('token');
                            window.location.href = '/login';
                            return;
                        }
                        return r.json();
                    }).then(data => {
                        if (data) this.stats = data;
                    }).catch(() => {
                        localStorage.removeItem('token');
                        window.location.href = '/login';
                    });
                },

                updatePageTitle() {
                    const titles = {
                        dashboard: '仪表盘',
                        posts: '文章管理',
                        editor: '编辑文章',
                        comments: '评论管理',
                        categories: '分类标签',
                        media: '媒体库',
                        themes: '主题管理',
                        plugins: '插件管理',
                        pages: '页面管理',
                        navigations: '导航管理',
                        settings: '系统设置'
                    };
                    this.pageTitle = titles[this.currentPage] || '管理后台';
                },

                loadDashboard() {
                    fetch('/api/admin/dashboard', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    }).then(r => r.json()).then(data => this.stats = data);
                },

                loadPosts() {
                    let url = '/api/admin/posts?page=1&page_size=20';
                    if (this.filterStatus) url += '&status=' + this.filterStatus;
                    if (this.searchKeyword) url += '&keyword=' + encodeURIComponent(this.searchKeyword);
                    fetch(url, { headers: { 'Authorization': 'Bearer ' + token }})
                        .then(r => r.json()).then(data => this.posts = data.posts || []);
                },

                loadComments() {
                    let url = '/api/admin/comments?page=1&page_size=50';
                    if (this.filterCommentStatus) url += '&status=' + this.filterCommentStatus;
                    fetch(url, { headers: { 'Authorization': 'Bearer ' + token }})
                        .then(r => r.json()).then(data => this.comments = data.comments || []);
                },

                loadCategories() {
                    fetch('/api/admin/categories', { headers: { 'Authorization': 'Bearer ' + token }})
                        .then(r => r.json()).then(data => this.categories = data || []);
                },

                loadTags() {
                    fetch('/api/admin/tags', { headers: { 'Authorization': 'Bearer ' + token }})
                        .then(r => r.json()).then(data => this.tags = data || []);
                },

                loadMedia() {
                    let url = '/api/admin/media?page=1&page_size=50';
                    if (this.filterMediaType) url += '&type=' + this.filterMediaType;
                    fetch(url, { headers: { 'Authorization': 'Bearer ' + token }})
                        .then(r => r.json()).then(data => this.media = data.media || []);
                },

                loadThemes() {
                    fetch('/api/admin/themes', { headers: { 'Authorization': 'Bearer ' + token }})
                        .then(r => r.json()).then(data => this.themes = data || []);
                },

                loadPlugins() {
                    fetch('/api/admin/plugins', { headers: { 'Authorization': 'Bearer ' + token }})
                        .then(r => r.json()).then(data => this.plugins = data || []);
                },

                loadSettings() {
                    fetch('/api/admin/settings', { headers: { 'Authorization': 'Bearer ' + token }})
                        .then(r => r.json()).then(data => this.settings = data || {});
                },

                initEditor() {
                    this.$nextTick(() => {
                        if (window.easyMDEInstance) {
                            window.easyMDEInstance.toTextArea();
                            window.easyMDEInstance = null;
                        }
                        
                        const el = document.getElementById('markdown-editor');
                        if (el) {
                            window.easyMDEInstance = new EasyMDE({
                                element: el,
                                spellChecker: false,
                                autosave: { enabled: false },
                                placeholder: '使用 Markdown 编写文章...',
                                toolbar: [
                                    'bold', 'italic', 'heading', '|',
                                    'quote', 'unordered-list', 'ordered-list', '|',
                                    'link', {
                                        name: 'upload-image',
                                        action: async function customImageUpload(editor) {
                                            const input = document.createElement('input');
                                            input.type = 'file';
                                            input.accept = 'image/*';
                                            input.onchange = async (e) => {
                                                const file = e.target.files[0];
                                                if (!file) return;
                                                await getCsrfToken();
                                                const formData = new FormData();
                                                formData.append('file', file);
                                                fetch('/api/admin/media/upload', {
                                                    method: 'POST',
                                                    headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken },
                                                    body: formData
                                                }).then(r => r.json()).then(data => {
                                                    if (data.url) {
                                                        const cm = editor.codemirror;
                                                        cm.replaceSelection(`![${file.name}](${data.url})`);
                                                    }
                                                });
                                            };
                                            input.click();
                                        },
                                        className: 'fa fa-picture-o',
                                        title: '上传图片',
                                    },
                                    'code', '|',
                                    'preview', 'side-by-side', 'fullscreen', '|',
                                    'guide'
                                ],
                                previewRender: (plainText) => {
                                    if (typeof marked !== 'undefined') {
                                        return marked.parse(plainText);
                                    }
                                    return plainText;
                                },
                                status: ['autosave', 'lines', 'words'],
                                minHeight: '300px'
                            });
                            
                            window.easyMDEInstance.codemirror.on('change', () => {
                                this.postContent = window.easyMDEInstance.value();
                            });
                            
                            if (this.postContent) {
                                window.easyMDEInstance.value(this.postContent);
                            }
                        }
                    });
                },

                saveDraft() {
                    this.savePost('draft');
                },

                publish() {
                    this.savePost('published');
                },

                async savePost(status) {
                    if (window.easyMDEInstance) {
                        this.postContent = window.easyMDEInstance.value();
                    }
                    
                    if (!this.postTitle || !this.postTitle.trim()) {
                        alert(this.editorMode === 'page' ? '请输入页面标题' : '请输入文章标题');
                        return;
                    }
                    
                    await getCsrfToken();
                    
                    if (this.editorMode === 'page') {
                        const data = {
                            title: this.postTitle,
                            slug: this.pageSlug,
                            content: this.postContent,
                            status: status,
                            is_in_nav: this.pageIsInNav,
                            nav_sort: this.pageNavSort
                        };
                        const url = this.editingPage ? '/api/admin/pages/' + this.editingPage.id : '/api/admin/pages';
                        const method = this.editingPage ? 'PUT' : 'POST';
                        
                        fetch(url, {
                            method: method,
                            headers: {
                                'Content-Type': 'application/json',
                                'Authorization': 'Bearer ' + token,
                                'X-CSRF-Token': csrfToken
                            },
                            body: JSON.stringify(data)
                        }).then(r => r.json()).then(() => {
                            alert('保存成功');
                            this.currentPage = 'pages';
                            this.loadPages();
                        }).catch(err => {
                            alert('保存失败: ' + err.message);
                        });
                        return;
                    }
                    
                    const data = {
                        title: this.postTitle,
                        content: this.postContent,
                        cover_image: this.postCoverImage || '',
                        category_id: this.postCategory ? parseInt(this.postCategory) : null,
                        tag_ids: this.selectedTags.map(t => t.id),
                        status: status
                    };
                    const url = this.editingPost ? '/api/admin/posts/' + this.editingPost.id : '/api/admin/posts';
                    const method = this.editingPost ? 'PUT' : 'POST';
                    
                    fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token,
                            'X-CSRF-Token': csrfToken
                        },
                        credentials: 'same-origin',
                        body: JSON.stringify(data)
                    }).then(r => {
                        if (!r.ok) {
                            return r.json().then(err => { throw new Error(err.error || '请求失败'); });
                        }
                        return r.json();
                    }).then(() => {
                        alert('保存成功');
                        this.currentPage = 'posts';
                        this.loadPosts();
                    }).catch(err => {
                        console.error('Save error:', err);
                        alert('保存失败: ' + err.message);
                    });
                },

                editPost(post) {
                    this.editorMode = 'post';
                    this.editingPost = post;
                    this.editingPage = null;
                    this.postTitle = post.title;
                    this.postContent = post.content;
                    this.postCoverImage = post.cover_image || '';
                    this.postCategory = post.category_id || '';
                    this.selectedTags = post.tags || [];
                    this.tagSearch = '';
                    this.filteredTags = [];
                    this.currentPage = 'editor';
                    this.$nextTick(() => {
                        if (window.easyMDEInstance) {
                            window.easyMDEInstance.value(this.postContent);
                        }
                    });
                },

                newPage() {
                    this.editorMode = 'page';
                    this.editingPage = null;
                    this.editingPost = null;
                    this.postTitle = '';
                    this.postContent = '';
                    this.pageSlug = '';
                    this.pageIsInNav = false;
                    this.pageNavSort = 0;
                    this.currentPage = 'editor';
                    this.$nextTick(() => {
                        if (window.easyMDEInstance) {
                            window.easyMDEInstance.value('');
                        }
                    });
                },

                editPage(page) {
                    this.editorMode = 'page';
                    this.editingPage = page;
                    this.editingPost = null;
                    this.postTitle = page.title;
                    this.postContent = page.content;
                    this.pageSlug = page.slug || '';
                    this.pageIsInNav = page.is_in_nav;
                    this.pageNavSort = page.nav_sort || 0;
                    this.currentPage = 'editor';
                    this.$nextTick(() => {
                        if (window.easyMDEInstance) {
                            window.easyMDEInstance.value(this.postContent);
                        }
                    });
                },

                searchTags() {
                    const query = this.tagSearch.toLowerCase().trim();
                    if (query) {
                        this.filteredTags = this.tags.filter(t => 
                            t.name.toLowerCase().includes(query) && 
                            !this.selectedTags.some(s => s.id === t.id)
                        );
                    } else {
                        this.filteredTags = this.tags.filter(t => 
                            !this.selectedTags.some(s => s.id === t.id)
                        );
                    }
                    this.showTagDropdown = true;
                },

                selectTag(tag) {
                    if (!this.selectedTags.some(t => t.id === tag.id)) {
                        this.selectedTags.push(tag);
                    }
                    this.tagSearch = '';
                    this.searchTags();
                    this.$refs.tagInput?.focus();
                },

                removeTag(tag) {
                    this.selectedTags = this.selectedTags.filter(t => t.id !== tag.id);
                    this.searchTags();
                },

                removeLastTag() {
                    if (this.tagSearch === '' && this.selectedTags.length > 0) {
                        this.selectedTags.pop();
                        this.searchTags();
                    }
                },

                async createTag() {
                    if (!this.tagSearch.trim()) return;
                    await getCsrfToken();
                    fetch('/api/admin/tags', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token,
                            'X-CSRF-Token': csrfToken
                        },
                        credentials: 'same-origin',
                        body: JSON.stringify({ name: this.tagSearch.trim() })
                    }).then(r => {
                        if (!r.ok) {
                            return r.json().then(err => { throw new Error(err.error || '创建失败'); });
                        }
                        return r.json();
                    }).then(tag => {
                        this.tags.push(tag);
                        this.selectedTags.push(tag);
                        this.tagSearch = '';
                        this.searchTags();
                    }).catch(err => {
                        console.error('Create tag error:', err);
                        alert('创建标签失败: ' + err.message);
                    });
                },

                createOrSelectTag() {
                    if (!this.tagSearch.trim()) return;
                    const existing = this.tags.find(t => 
                        t.name.toLowerCase() === this.tagSearch.toLowerCase()
                    );
                    if (existing) {
                        this.selectTag(existing);
                    } else {
                        this.createTag();
                    }
                },

                deletePost(id) {
                    if (!confirm('确定要删除这篇文章吗？')) return;
                    fetch('/api/admin/posts/' + id, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadPosts());
                },

                approveComment(id) {
                    fetch('/api/admin/comments/' + id + '/approve', {
                        method: 'PUT',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadComments());
                },

                spamComment(id) {
                    fetch('/api/admin/comments/' + id + '/spam', {
                        method: 'PUT',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadComments());
                },

                deleteComment(id) {
                    if (!confirm('确定要删除这条评论吗？')) return;
                    fetch('/api/admin/comments/' + id, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadComments());
                },

                batchAction(action) {
                    if (this.selectedComments.length === 0) return;
                    fetch('/api/admin/comments/batch', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token,
                            'X-CSRF-Token': csrfToken
                        },
                        body: JSON.stringify({ action: action, ids: this.selectedComments })
                    }).then(() => {
                        this.selectedComments = [];
                        this.loadComments();
                    });
                },

                saveCategory() {
                    const url = this.editingCategory ? '/api/admin/categories/' + this.editingCategory.id : '/api/admin/categories';
                    const method = this.editingCategory ? 'PUT' : 'POST';
                    fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token,
                            'X-CSRF-Token': csrfToken
                        },
                        body: JSON.stringify(this.categoryForm)
                    }).then(() => {
                        this.showCategoryModal = false;
                        this.categoryForm = { name: '', description: '' };
                        this.loadCategories();
                    });
                },

                deleteCategory(id) {
                    if (!confirm('确定要删除这个分类吗？')) return;
                    fetch('/api/admin/categories/' + id, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadCategories());
                },

                saveTag() {
                    const url = this.editingTag ? '/api/admin/tags/' + this.editingTag.id : '/api/admin/tags';
                    const method = this.editingTag ? 'PUT' : 'POST';
                    fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token,
                            'X-CSRF-Token': csrfToken
                        },
                        body: JSON.stringify(this.tagForm)
                    }).then(() => {
                        this.showTagModal = false;
                        this.tagForm = { name: '' };
                        this.loadTags();
                    });
                },

                deleteTag(id) {
                    if (!confirm('确定要删除这个标签吗？')) return;
                    fetch('/api/admin/tags/' + id, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadTags());
                },

                uploadFile(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const formData = new FormData();
                    formData.append('file', file);
                    fetch('/api/admin/media/upload', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken },
                        body: formData
                    }).then(() => this.loadMedia());
                },

                deleteMedia(id) {
                    if (!confirm('确定要删除这个文件吗？')) return;
                    fetch('/api/admin/media/' + id, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadMedia());
                },

                uploadTheme(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const formData = new FormData();
                    formData.append('file', file);
                    fetch('/api/admin/themes/upload', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken },
                        body: formData
                    }).then(() => this.loadThemes());
                },

                activateTheme(id) {
                    fetch('/api/admin/themes/' + id + '/activate', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadThemes());
                },

                deleteTheme(id) {
                    if (!confirm('确定要删除这个主题吗？')) return;
                    fetch('/api/admin/themes/' + id, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadThemes());
                },

                openThemeConfig(id) {
                    this.themeConfigTheme = this.themes.find(t => t.id === id);
                    fetch('/api/admin/themes/' + id + '/config', { headers: { 'Authorization': 'Bearer ' + token }})
                        .then(r => r.json()).then(data => {
                            this.themeConfigDefs = data.Fields || {};
                            this.themeConfigValues = data.Values || {};
                            if (Object.keys(this.themeConfigDefs).length === 0) {
                                alert('该主题没有可配置项');
                                return;
                            }
                            this.showThemeConfig = true;
                        });
                },

                saveThemeConfig() {
                    if (!this.themeConfigTheme) return;
                    fetch('/api/admin/themes/' + this.themeConfigTheme.id + '/config', {
                        method: 'PUT',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken, 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.themeConfigValues)
                    }).then(r => r.json()).then(data => {
                        this.showThemeConfig = false;
                    });
                },

                uploadPlugin(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    const formData = new FormData();
                    formData.append('file', file);
                    fetch('/api/admin/plugins/upload', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken },
                        body: formData
                    }).then(r => r.json()).then(data => {
                        if (data.error) {
                            alert(data.error);
                        }
                        this.loadPlugins();
                        e.target.value = '';
                    }).catch(err => {
                        alert('上传失败: ' + err.message);
                    });
                },

                togglePlugin(plugin) {
                    const url = plugin.is_active ? '/api/admin/plugins/' + plugin.id + '/deactivate' : '/api/admin/plugins/' + plugin.id + '/activate';
                    fetch(url, {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadPlugins());
                },

                deletePlugin(id) {
                    if (!confirm('确定要删除这个插件吗？')) return;
                    fetch('/api/admin/plugins/' + id, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadPlugins());
                },

                openPluginConfig(id) {
                    this.pluginConfigPlugin = this.plugins.find(p => p.id === id);
                    fetch('/api/admin/plugins/' + id + '/config', { headers: { 'Authorization': 'Bearer ' + token }})
                        .then(r => r.json()).then(data => {
                            this.pluginConfigDefs = data.Fields || {};
                            this.pluginConfigValues = data.Values || {};
                            if (Object.keys(this.pluginConfigDefs).length === 0) {
                                alert('该插件没有可配置项');
                                return;
                            }
                            this.showPluginConfig = true;
                        });
                },

                savePluginConfig() {
                    if (!this.pluginConfigPlugin) return;
                    fetch('/api/admin/plugins/' + this.pluginConfigPlugin.id + '/config', {
                        method: 'PUT',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken, 'Content-Type': 'application/json' },
                        body: JSON.stringify(this.pluginConfigValues)
                    }).then(r => r.json()).then(data => {
                        this.showPluginConfig = false;
                    });
                },

                saveSettings() {
                    fetch('/api/admin/settings', {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token,
                            'X-CSRF-Token': csrfToken
                        },
                        body: JSON.stringify(this.settings)
                    }).then(() => alert('设置已保存'));
                },

                async uploadAuthorAvatar(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    await getCsrfToken();
                    const formData = new FormData();
                    formData.append('file', file);
                    fetch('/api/admin/media/upload', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken },
                        body: formData
                    }).then(r => r.json()).then(data => {
                        if (data.url) {
                            this.settings.author_avatar = data.url;
                        }
                    });
                },

                async uploadCoverImage(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    await getCsrfToken();
                    const formData = new FormData();
                    formData.append('file', file);
                    fetch('/api/admin/media/upload', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken },
                        body: formData
                    }).then(r => r.json()).then(data => {
                        if (data.url) {
                            this.postCoverImage = data.url;
                        }
                    });
                },

                async uploadSettingImage(field) {
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = 'image/*';
                    input.onchange = async (e) => {
                        const file = e.target.files[0];
                        if (!file) return;
                        await getCsrfToken();
                        const formData = new FormData();
                        formData.append('file', file);
                        fetch('/api/admin/media/upload', {
                            method: 'POST',
                            headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken },
                            body: formData
                        }).then(r => r.json()).then(data => {
                            if (data.url) {
                                this.settings[field] = data.url;
                            }
                        });
                    };
                    input.click();
                },

                copyToClipboard(text) {
                    navigator.clipboard.writeText(text).then(() => {
                        this.copiedMediaUrl = text;
                        setTimeout(() => { this.copiedMediaUrl = ''; }, 2000);
                    });
                },

                async loadPages() {
                    const res = await fetch('/api/admin/pages', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    const data = await res.json();
                    this.pages = data.pages || [];
                },

                async publishPage(id) {
                    await getCsrfToken();
                    fetch('/api/admin/pages/' + id + '/publish', {
                        method: 'POST',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadPages());
                },

                async deletePage(id) {
                    if (!confirm('确定要删除这个页面吗？')) return;
                    await getCsrfToken();
                    fetch('/api/admin/pages/' + id, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadPages());
                },

                async loadNavigations() {
                    const res = await fetch('/api/admin/navigations', {
                        headers: { 'Authorization': 'Bearer ' + token }
                    });
                    this.navigations = await res.json();
                },

                editNav(nav) {
                    this.editingNav = nav;
                    this.navForm = {
                        name: nav.name,
                        url: nav.url,
                        icon: nav.icon || '',
                        target: nav.target || '_self',
                        sort_order: nav.sort_order,
                        parent_id: nav.parent_id,
                        is_active: nav.is_active
                    };
                    this.showNavModal = true;
                },

                async saveNav() {
                    if (!this.navForm.name || !this.navForm.url) {
                        alert('请填写名称和链接');
                        return;
                    }
                    await getCsrfToken();
                    const url = this.editingNav ? '/api/admin/navigations/' + this.editingNav.id : '/api/admin/navigations';
                    const method = this.editingNav ? 'PUT' : 'POST';
                    
                    fetch(url, {
                        method: method,
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + token,
                            'X-CSRF-Token': csrfToken
                        },
                        body: JSON.stringify(this.navForm)
                    }).then(r => r.json()).then(() => {
                        this.showNavModal = false;
                        this.loadNavigations();
                        alert('保存成功');
                    }).catch(err => {
                        alert('保存失败: ' + err.message);
                    });
                },

                async deleteNav(id) {
                    if (!confirm('确定要删除这个导航吗？')) return;
                    await getCsrfToken();
                    fetch('/api/admin/navigations/' + id, {
                        method: 'DELETE',
                        headers: { 'Authorization': 'Bearer ' + token, 'X-CSRF-Token': csrfToken }
                    }).then(() => this.loadNavigations());
                },

                formatSize(bytes) {
                    if (bytes < 1024) return bytes + ' B';
                    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
                    return (bytes / 1024 / 1024).toFixed(1) + ' MB';
                },

                logout() {
                    localStorage.removeItem('token');
                    window.location.href = '/';
                }
            };
        }
    </script>
</body>
</html>
