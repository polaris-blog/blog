<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - {{if .settings.site_title}}{{.settings.site_title}}{{else}}Polaris{{end}}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.css">
    <script src="https://cdn.jsdelivr.net/npm/easymde/dist/easymde.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        // Dark Mode Initialization
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'system-ui', '-apple-system', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .sidebar-link.active { background-color: #f1f5f9; color: #0f172a; font-weight: 600; }
        html.dark .sidebar-link.active { background-color: #27272a; color: #fafafa; font-weight: 600; }
        .EasyMDEContainer { display: flex; flex-direction: column; height: 100%; }
        .EasyMDEContainer .CodeMirror { flex: 1; min-height: 300px; border-radius: 0.5rem; }
        .EasyMDEContainer .editor-toolbar { border-radius: 0.5rem 0.5rem 0 0; border-color: #e2e8f0; }
        .EasyMDEContainer .CodeMirror { border-color: #e2e8f0; }
        html.dark .EasyMDEContainer .CodeMirror { border-color: #27272a; background: #09090b; color: #fafafa; }
        .EasyMDEContainer .editor-preview { background: #fff; padding: 1rem; }
        html.dark .EasyMDEContainer .editor-preview { background: #09090b; padding: 1rem; color: #fafafa; }
        .EasyMDEContainer .editor-preview h1 { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
        .EasyMDEContainer .editor-preview h2 { font-size: 1.5rem; font-weight: 600; margin-top: 1.5rem; margin-bottom: 0.75rem; }
        .EasyMDEContainer .editor-preview h3 { font-size: 1.25rem; font-weight: 600; margin-top: 1rem; margin-bottom: 0.5rem; }
        .EasyMDEContainer .editor-preview p { margin-bottom: 1rem; line-height: 1.75; }
        .EasyMDEContainer .editor-preview ul, .EasyMDEContainer .editor-preview ol { margin-left: 1.5rem; margin-bottom: 1rem; }
        .EasyMDEContainer .editor-preview code { background: #f1f5f9; padding: 0.125rem 0.375rem; border-radius: 0.25rem; }
        html.dark .EasyMDEContainer .editor-preview code { background: #18181b; color: #e4e4e7; }
        .EasyMDEContainer .editor-preview pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 0.5rem; overflow-x: auto; }
        html.dark .EasyMDEContainer .editor-preview pre { background: #000000; color: #e2e8f0; border: 1px solid #27272a; }
        .EasyMDEContainer .editor-preview pre code { background: transparent; padding: 0; }
        .EasyMDEContainer .editor-preview blockquote { border-left: 4px solid #000000; padding-left: 1rem; margin: 1rem 0; color: #64748b; }
        html.dark .EasyMDEContainer .editor-preview blockquote { border-color: #fafafa; color: #a1a1aa; }
        .EasyMDEContainer .editor-preview img { max-width: 100%; border-radius: 0.5rem; }
        
        /* Dark Mode Toolbar Fixes */
        html.dark .editor-toolbar { border-color: #27272a; opacity: 1; background: #09090b; }
        html.dark .editor-toolbar button { color: #a1a1aa !important; }
        html.dark .editor-toolbar button:hover, html.dark .editor-toolbar button.active { background: #27272a !important; color: #fafafa !important; border-color: #27272a; }
        html.dark .editor-toolbar i.separator { border-left-color: #27272a; border-right-color: #27272a; }
        html.dark .editor-statusbar { border-color: #27272a; color: #a1a1aa; }
    </style>
</head>
<body class="bg-[#FAFAFA] dark:bg-[#09090B] font-sans antialiased text-slate-900 dark:text-[#FAFAFA]" x-data="app()" x-init="init()">
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-[#FAFAFA] dark:bg-[#09090B] border-r border-slate-200 dark:border-[#18181B] flex flex-col" :class="{ 'hidden': !sidebarOpen }">
            <div class="p-6 border-b border-slate-200 dark:border-[#18181B] flex items-center h-16">
                <a href="/" class="flex items-center gap-2">
                    <span class="text-xl font-extrabold text-slate-900 dark:text-white tracking-tight">{{if .settings.site_title}}{{.settings.site_title}}{{else}}Polaris{{end}}</span>
                </a>
            </div>
            <nav class="flex-1 px-3 py-4 space-y-5 overflow-y-auto">
                <div>
                    <p class="px-3 text-[11px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5">内容</p>
                    <a href="#/dashboard" @click="currentPage = 'dashboard'" 
                        class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-100 dark:hover:bg-[#18181B] transition-colors text-sm"
                        :class="{ 'active': currentPage === 'dashboard' }">
                        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
                        仪表盘
                    </a>
                    <a href="#/posts" @click="currentPage = 'posts'"
                        class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-100 dark:hover:bg-[#18181B] transition-colors text-sm"
                        :class="{ 'active': currentPage === 'posts' || currentPage === 'post-edit' }">
                        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                        文章
                    </a>
                    <a href="#/pages" @click="currentPage = 'pages'"
                        class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-100 dark:hover:bg-[#18181B] transition-colors text-sm"
                        :class="{ 'active': currentPage === 'pages' || currentPage === 'page-edit' }">
                        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21h10a2 2 0 002-2V9.414a1 1 0 00-.293-.707l-5.414-5.414A1 1 0 0012.586 3H7a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
                        页面
                    </a>
                    <a href="#/categories" @click="currentPage = 'categories'"
                        class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-100 dark:hover:bg-[#18181B] transition-colors text-sm"
                        :class="{ 'active': currentPage === 'categories' }">
                        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
                        分类标签
                    </a>
                    <a href="#/comments" @click="currentPage = 'comments'"
                        class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-100 dark:hover:bg-[#18181B] transition-colors text-sm"
                        :class="{ 'active': currentPage === 'comments' }">
                        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
                        评论
                    </a>
                    <a href="#/media" @click="currentPage = 'media'"
                        class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-100 dark:hover:bg-[#18181B] transition-colors text-sm"
                        :class="{ 'active': currentPage === 'media' }">
                        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        媒体库
                    </a>
                </div>
                <div>
                    <p class="px-3 text-[11px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5">外观</p>
                    <a href="#/navigations" @click="currentPage = 'navigations'"
                        class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-100 dark:hover:bg-[#18181B] transition-colors text-sm"
                        :class="{ 'active': currentPage === 'navigations' }">
                        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
                        导航菜单
                    </a>
                    <a href="#/themes" @click="currentPage = 'themes'"
                        class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-100 dark:hover:bg-[#18181B] transition-colors text-sm"
                        :class="{ 'active': currentPage === 'themes' }">
                        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 21a4 4 0 01-4-4V5a2 2 0 012-2h4a2 2 0 012 2v12a4 4 0 01-4 4zm0 0h12a2 2 0 002-2v-4a2 2 0 00-2-2h-2.343M11 7.343l1.657-1.657a2 2 0 012.828 0l2.829 2.829a2 2 0 010 2.828l-8.486 8.485M7 17h.01"/></svg>
                        主题
                    </a>
                </div>
                <div>
                    <p class="px-3 text-[11px] font-semibold text-slate-400 dark:text-slate-500 uppercase tracking-widest mb-1.5">系统</p>
                    <a href="#/plugins" @click="currentPage = 'plugins'"
                        class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-100 dark:hover:bg-[#18181B] transition-colors text-sm"
                        :class="{ 'active': currentPage === 'plugins' }">
                        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"/></svg>
                        插件
                    </a>
                    <a href="#/settings" @click="currentPage = 'settings'"
                        class="sidebar-link flex items-center gap-3 px-3 py-2 rounded-lg text-slate-600 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-100 dark:hover:bg-[#18181B] transition-colors text-sm"
                        :class="{ 'active': currentPage === 'settings' }">
                        <svg class="w-[18px] h-[18px]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        设置
                    </a>
                </div>
            </nav>
            <div class="px-4 py-6 border-t border-slate-200 dark:border-[#18181B]">
                <a href="/" target="_blank" class="flex items-center justify-center gap-2 text-sm text-slate-500 dark:text-slate-400 hover:text-black dark:hover:text-white transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
                    </svg>
                    查看站点
                </a>
            </div>
        </aside>

        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-[#FAFAFA] dark:bg-[#09090B] border-b border-slate-200 dark:border-[#18181B] h-16 flex items-center justify-between px-6 z-10 sticky top-0">
                <button @click="sidebarOpen = !sidebarOpen" class="lg:hidden p-2 text-slate-500 dark:text-slate-400 hover:text-black dark:text-slate-400 dark:hover:text-white transition-colors rounded-md">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
                <h1 class="text-lg font-bold text-slate-900 dark:text-white tracking-tight" x-text="pageTitle"></h1>
                <div class="flex items-center gap-4">
                    <a href="#/posts/new" @click="postCoverImage = ''; currentPage = 'editor'; editingPost = null"
                        class="px-4 py-2 font-bold bg-black dark:bg-white text-white dark:text-black rounded-lg hover:bg-slate-800 dark:hover:bg-slate-200 transition-colors text-sm">
                        + 新文章
                    </a>
                    
                    <!-- Theme Toggle -->
                    <button id="theme-toggle" class="p-2 rounded-md text-slate-500 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-100 dark:hover:bg-[#18181B] transition-colors" aria-label="Toggle Dark Mode"
                        onclick="
                            document.documentElement.classList.toggle('dark'); 
                            localStorage.theme = document.documentElement.classList.contains('dark') ? 'dark' : 'light';
                            // also toggle icon logic here visually if not using alpine
                        ">
                        <svg class="w-5 h-5 dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
                        </svg>
                        <svg class="w-5 h-5 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
                        </svg>
                    </button>
                    
                    <div class="relative" x-data="{ open: false }">
                        <button @click="open = !open" class="flex items-center gap-2 ring-1 ring-slate-200 dark:ring-zinc-800 rounded-full transition-shadow hover:ring-black dark:hover:ring-white">
                            <div class="w-8 h-8 bg-slate-100 dark:bg-[#18181B] rounded-full flex items-center justify-center text-slate-900 dark:text-white font-bold">
                                <span x-text="user?.nickname?.charAt(0) || 'A'"></span>
                            </div>
                        </button>
                        <div x-show="open" @click.away="open = false" x-cloak
                            class="absolute right-0 mt-2 w-48 bg-white dark:bg-[#09090B] rounded-xl shadow-lg border border-slate-200 dark:border-zinc-800 py-2">
                            <a href="#/profile" class="block px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-50 dark:bg-[#18181B] dark:hover:bg-zinc-900 transition-colors">个人设置</a>
                            <button @click="logout()" class="w-full text-left px-4 py-2 text-sm font-medium text-slate-600 dark:text-slate-300 dark:text-slate-400 hover:text-black dark:hover:text-white hover:bg-slate-50 dark:bg-[#18181B] dark:hover:bg-zinc-900 transition-colors">退出登录</button>
                        </div>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-auto p-6 md:p-8">
                <template x-if="currentPage === 'dashboard'">
                    <div x-init="loadDashboard()">
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                            <div class="bg-white dark:bg-[#09090B] rounded-xl p-6 border border-slate-200 dark:border-zinc-800 shadow-sm hover:border-black dark:hover:border-white transition-colors">
                                <p class="text-xs font-bold text-slate-400 dark:text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">文章总数</p>
                                <p class="text-4xl font-extrabold text-slate-900 dark:text-white tracking-tight" x-text="stats.total_posts"></p>
                            </div>
                            <div class="bg-white dark:bg-[#09090B] rounded-xl p-6 border border-slate-200 dark:border-zinc-800 shadow-sm hover:border-black dark:hover:border-white transition-colors">
                                <p class="text-xs font-bold text-slate-400 dark:text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">评论总数</p>
                                <p class="text-4xl font-extrabold text-slate-900 dark:text-white tracking-tight" x-text="stats.total_comments"></p>
                            </div>
                            <div class="bg-white dark:bg-[#09090B] rounded-xl p-6 border border-slate-200 dark:border-zinc-800 shadow-sm hover:border-black dark:hover:border-white transition-colors">
                                <p class="text-xs font-bold text-slate-400 dark:text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">总访问量</p>
                                <p class="text-4xl font-extrabold text-slate-900 dark:text-white tracking-tight" x-text="stats.total_views"></p>
                            </div>
                            <div class="bg-white dark:bg-[#09090B] rounded-xl p-6 border border-slate-200 dark:border-zinc-800 shadow-sm hover:border-black dark:hover:border-white transition-colors">
                                <p class="text-xs font-bold text-slate-400 dark:text-slate-500 dark:text-slate-400 uppercase tracking-widest mb-2">待审核评论</p>
                                <p class="text-4xl font-extrabold text-slate-900 dark:text-white tracking-tight" x-text="stats.pending_comments"></p>
                            </div>
                        </div>
                        <div class="bg-white dark:bg-[#09090B] rounded-xl border border-slate-200 dark:border-zinc-800 shadow-sm p-8">
                            <h3 class="font-bold text-slate-900 dark:text-white mb-6">快速操作</h3>
                            <div class="flex flex-wrap gap-4">
                                <a href="#/posts/new" @click="postCoverImage = ''; currentPage = 'editor'; editingPost = null"
                                    class="px-5 py-2.5 bg-black dark:bg-white text-white dark:text-black font-bold rounded-lg hover:bg-slate-800 dark:hover:bg-slate-200 transition-colors text-sm">写文章</a>
                                <a href="#/comments" @click="currentPage = 'comments'; loadComments()"
                                    class="px-5 py-2.5 border border-slate-200 dark:border-zinc-800 text-slate-700 dark:text-slate-300 font-bold rounded-lg hover:border-black dark:hover:border-white hover:text-black dark:hover:text-white transition-colors text-sm">审核评论</a>
                                <a href="#/media" @click="currentPage = 'media'; loadMedia()"
                                    class="px-5 py-2.5 border border-slate-200 dark:border-zinc-800 text-slate-700 dark:text-slate-300 font-bold rounded-lg hover:border-black dark:hover:border-white hover:text-black dark:hover:text-white transition-colors text-sm">上传媒体</a>
                            </div>
                        </div>
                    </div>
                </template>

                <template x-if="currentPage === 'posts'">
                    <div x-init="loadPosts()">
                        <div class="bg-white dark:bg-[#09090B] rounded-xl border border-slate-200 dark:border-zinc-800">
                            <div class="p-4 border-b border-slate-200 dark:border-zinc-800 flex justify-between items-center">
                                <input type="text" placeholder="搜索文章..." 
                                    class="px-4 py-2 border border-slate-200 dark:border-zinc-800 rounded-lg bg-transparent focus:outline-none focus:border-black dark:focus:border-white w-64"
                                    x-model="searchKeyword" @keyup.enter="loadPosts()">

                                </thead>
                                <tbody>
                                    <template x-for="post in posts" :key="post.id">

                                            <td class="px-4 py-3">
                                                <a :href="'/post/' + post.slug" target="_blank" class="hover:text-slate-900 dark:hover:text-white" x-text="post.title"></a>

                                            <td class="px-4 py-3 text-sm text-slate-500 dark:text-slate-400" x-text="post.category?.name || '-'"></td>
                                            <td class="px-4 py-3">
                                                <span class="text-xs px-2 py-1 rounded"

                                                        'bg-green-100 text-green-700': post.status === 'published',
                                                        'bg-yellow-100 text-yellow-700': post.status === 'draft',
                                                        'bg-blue-100 text-blue-700': post.status === 'scheduled'

                                            </td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </template>

                <template x-if="currentPage === 'editor'">
                    <div class="h-full flex flex-col" x-init="initEditor()">
                        <div class="flex-1 flex flex-col bg-white dark:bg-[#09090B] rounded-xl border border-slate-200 dark:border-zinc-800 overflow-hidden">
                            <textarea id="markdown-editor" x-model="postContent" class="hidden"></textarea>
                        </div>
                        <div class="mt-4 bg-white dark:bg-[#09090B] rounded-xl border border-slate-200 dark:border-zinc-800 p-4">
                            <div class="grid grid-cols-3 gap-4 mb-4">
                                <div>
                                    <label class="block text-sm font-medium mb-1">标题</label>
                                    <input type="text" x-model="postTitle" class="w-full px-4 py-2 border border-slate-200 dark:border-zinc-800 rounded-lg bg-transparent focus:outline-none focus:border-black dark:focus:border-white">
                                </div>
                                <div x-show="editorMode === 'post'">
                                    <label class="block text-sm font-medium mb-1">分类</label>
                                    <select x-model="postCategory" class="w-full px-4 py-2 border border-slate-200 dark:border-zinc-800 rounded-lg bg-transparent focus:outline-none focus:border-black dark:focus:border-white">
                                        <option value="">选择分类</option>
                                        <template x-for="cat in categories" :key="cat.id">
                                            <option :value="cat.id" x-text="cat.name"></option>
                                        </template>
                                    </select>
                                </div>
                                <div x-show="editorMode === 'post'">
                                    <label class="block text-sm font-medium mb-1">标签</label>
                                    <div class="relative">
                                        <div class="min-h-[42px] w-full px-3 py-2 border border-slate-200 dark:border-zinc-800 rounded-lg bg-transparent focus:outline-none focus:border-black dark:focus:border-white flex flex-wrap gap-2 items-center cursor-text"
                                            @click="$refs.tagInput.focus()">
                                            <template x-for="tag in selectedTags" :key="tag.id">
                                                <span class="inline-flex items-center gap-1 px-2 py-1 bg-slate-100 dark:bg-zinc-800 text-slate-900 dark:text-white font-medium text-sm rounded-full">
                                                    <span x-text="tag.name"></span>
                                                    <button @click.stop="removeTag(tag)" class="hover:text-red-500 transition">
                                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                                                        </svg>
                                                    </button>
                                                </span>
                                            </template>
                                            <input type="text" x-ref="tagInput" x-model="tagSearch"
                                                @input="searchTags()" @focus="showTagDropdown = true; searchTags()"
                                                @keydown.enter.prevent="createOrSelectTag()"
                                                @keydown.backspace="removeLastTag()"
                                                placeholder="搜索或创建标签..."
                                                class="flex-1 min-w-[120px] outline-none text-sm bg-transparent">
                                        </div>
                                        <div x-show="showTagDropdown && (filteredTags.length > 0 || tagSearch)"
                                            @click.away="showTagDropdown = false"
                                            class="absolute z-50 top-full left-0 right-0 mt-1 bg-white border border-slate-200 dark:border-zinc-800 rounded-lg bg-transparent focus:outline-none focus:border-black dark:focus:border-white-lg shadow-lg max-h-48 overflow-auto">
                                            <template x-for="tag in filteredTags" :key="tag.id">
                                                <div @click="selectTag(tag)"
                                                    class="px-3 py-2 hover:bg-slate-100 dark:hover:bg-zinc-800 cursor-pointer flex items-center justify-between"
                                                    :class="{ 'bg-slate-100 dark:bg-zinc-800 font-bold': selectedTags.some(t => t.id === tag.id) }">
                                                    <span x-text="tag.name"></span>
                                                    <svg x-show="selectedTags.some(t => t.id === tag.id)" class="w-4 h-4 text-slate-900 dark:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                                                    </svg>
                                                </div>
                                            </template>
                                            <div x-show="tagSearch && !filteredTags.some(t => t.name.toLowerCase() === tagSearch.toLowerCase())"
                                                @click="createTag()"
                                                class="px-3 py-2 hover:bg-slate-50 dark:hover:bg-[#18181B] cursor-pointer text-slate-900 dark:text-white font-bold flex items-center gap-2">
                                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                                                </svg>
                                                <span>创建 "<span x-text="tagSearch"></span>"</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div x-show="editorMode === 'page'">
                                    <label class="block text-sm font-medium mb-1">Slug (URL路径)</label>
                                    <input type="text" x-model="pageSlug" class="w-full px-4 py-2 border border-slate-200 dark:border-zinc-800 rounded-lg bg-transparent focus:outline-none focus:border-black dark:focus:border-white" placeholder="留空自动生成">
                                </div>
                                <div x-show="editorMode === 'page'">
                                    <label class="block text-sm font-medium mb-1">导航排序</label>
                                    <input type="number" x-model="pageNavSort" class="w-full px-4 py-2 border border-slate-200 dark:border-zinc-800 rounded-lg bg-transparent focus:outline-none focus:border-black dark:focus:border-white" placeholder="0">
                                </div>
                            </div>
                            <div x-show="editorMode === 'post'" class="mb-4">
                                <label class="block text-sm font-medium mb-1">封面图</label>
                                <div class="flex gap-2">
                                    <input type="text" x-model="postCoverImage" placeholder="图片URL或点击上传"
                                        class="flex-1 px-4 py-2 border border-slate-200 dark:border-zinc-800 rounded-lg bg-transparent focus:outline-none focus:border-black dark:focus:border-white">
                                    <label class="px-4 py-2 bg-slate-100 dark:bg-zinc-800 text-slate-700 dark:text-slate-300 rounded-lg cursor-pointer hover:bg-slate-200 dark:hover:bg-zinc-700 transition text-sm font-medium">
                                        上传
                                        <input type="file" class="hidden" accept="image/*" @change="uploadCoverImage($event)">
                                    </label>
                                </div>
                                <div x-show="postCoverImage" class="mt-2 relative inline-block">
                                    <img :src="postCoverImage" alt="封面图" class="w-48 h-28 object-cover rounded-lg border border-slate-200 dark:border-zinc-800">
                                    <button type="button" @click="postCoverImage = ''" class="absolute -top-2 -right-2 w-5 h-5 bg-red-500 text-white rounded-full text-xs flex items-center justify-center hover:bg-red-600">&times;</button>
                                </div>
                            </div>
                            <div x-show="editorMode === 'page'" class="mb-4">
                                <label class="flex items-center gap-2">
                                    <input type="checkbox" x-model="pageIsInNav" class="rounded">
                                    <span class="text-sm">显示在导航栏</span>
                                </label>
                            </div>
                            <div class="flex justify-between items-center">
                                <div class="flex gap-2">
                                    <button @click="saveDraft()" class="px-4 py-2 border border-slate-200 dark:border-zinc-800 rounded-lg bg-transparent focus:outline-none focus:border-black dark:focus:border-white hover:border-black dark:hover:border-white focus:border-black dark:focus:border-white transition">
                                        保存草稿
                                    </button>
                                    <button @click="publish()" class="px-4 py-2 bg-black dark:bg-white text-white dark:text-black font-bold rounded-lg hover:opacity-80 hover:opacity-60 transition">
                                        发布
                                    </button>
                                </div>
                                <div class="text-sm text-slate-500 dark:text-slate-400">
                                    字数: <span x-text="postContent.length"></span>
                                </div>
                            </div>
                        </div>
                    </div>
                </template>

                <template x-if="currentPage === 'comments'">
                    <div x-init="loadComments()">
                        <div class="bg-white dark:bg-[#09090B] rounded-xl border border-slate-200 dark:border-zinc-800">
                            <div class="p-4 border-b border-slate-200 dark:border-zinc-800 flex justify-between items-center">
                                <select class="px-4 py-2 border border-slate-200 dark:border-zinc-800 rounded-lg bg-transparent focus:outline-none focus:border-black dark:focus:border-white" x-model="filterCommentStatus" @change="loadComments()">
                                    <option value="">全部状态</option>
                                    <option value="pending">待审核</option>
                                    <option value="approved">已通过</option>
                                    <option value="spam">垃圾评论</option>
                                </select>
                                <div class="flex gap-2">
                                    <button @click="batchAction('approve')" class="px-4 py-2 border border-slate-200 dark:border-zinc-800 rounded-lg bg-transparent focus:outline-none focus:border-black dark:focus:border-white hover:border-black dark:hover:border-white focus:border-black dark:focus:border-white transition">批量通过</button>
                                    <button @click="batchAction('spam')" class="px-4 py-2 border border-slate-200 dark:border-zinc-800 rounded-lg bg-transparent focus:outline-none focus:border-black dark:focus:border-white hover:border-black dark:hover:border-white focus:border-black dark:focus:border-white transition">批量标记垃圾</button>
                                    <button @click="batchAction('delete')" class="px-4 py-2 border border-red-200 text-red-500 rounded hover:border-red-500 transition">批量删除</button>
                                </div>
                            </div>
                            <div class="divide-y divide-slate-100">
                                <template x-for="comment in comments" :key="comment.id">
                                    <div class="p-4 hover:bg-slate-50 dark:bg-[#18181B]">
                                        <div class="flex items-start gap-4">
                                            <input type="checkbox" :value="comment.id" x-model="selectedComments" class="mt-1">
                                            <div class="flex-1">
                                                <div class="flex items-center gap-2 mb-2">
                                                    <span class="font-medium" x-text="comment.author_name"></span>
                                                    <span class="text-xs text-slate-400" x-text="comment.author_email"></span>
                                                    <span class="text-xs px-2 py-0.5 rounded"
                                                        :class="{
                                                            'bg-yellow-100 text-yellow-700': comment.status === 'pending',
                                                            'bg-green-100 text-green-700': comment.status === 'approved',
                                                            'bg-red-100 text-red-700': comment.status === 'spam'
                                                        }"
                                                        x-text="comment.status === 'pending' ? '待审核' : comment.status === 'approved' ? '已通过' : '垃圾'"></span>
                                                </div>
                                                <p class="text-slate-600 dark:text-slate-300 mb-2" x-text="comment.content"></p>
                                                <div class="flex items-center gap-4 text-sm">
                                                    <span class="text-slate-400" x-text="new Date(comment.created_at).toLocaleString()"></span>
                                                    <a :href="'/post/' + comment.post?.slug" target="_blank" class="text-slate-900 dark:text-white font-bold hover:underline" x-text="comment.post?.title"></a>
                                                </div>
                                            </div>
                                            <div class="flex gap-2">
                                                <button @click="approveComment(comment.id)" x-show="comment.status !== 'approved'" 
                                                    class="text-green-500 hover:underline text-sm">通过</button>
                                                <button @click="spamComment(comment.id)" x-show="comment.status !== 'spam'" 
                                                    class="text-red-500 hover:underline text-sm">垃圾</button>
                                                <button @click="deleteComment(comment.id)" class="text-slate-400 hover:text-red-500 text-sm">删除</button>
                                            </div>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                <template x-if="currentPage === 'categories'">
                    <div x-init="loadCategories(); loadTags()" class="grid grid-cols-2 gap-6">
                        <div class="bg-white dark:bg-[#09090B] rounded-xl border border-slate-200 dark:border-zinc-800">
                            <div class="p-4 border-b border-slate-200 dark:border-zinc-800 flex justify-between items-center">
                                <h3 class="font-semibold">分类管理</h3>
                                <button @click="showCategoryModal = true; editingCategory = null" 
                                    class="px-4 py-2 bg-black dark:bg-white text-white dark:text-black font-bold rounded-lg hover:opacity-80 text-sm">+ 添加分类</button>
                            </div>
                            <div class="divide-y divide-slate-100">
                                <template x-for="cat in categories" :key="cat.id">
                                    <div class="p-4 flex justify-between items-center hover:bg-slate-50 dark:bg-[#18181B]">
                                        <div>
                                            <span class="font-medium" x-text="cat.name"></span>
                                            <span class="text-sm text-slate-400 ml-2" x-text="cat.post_count + ' 篇文章'"></span>
                                        </div>
                                        <div class="flex gap-2">
                                            <button @click="editingCategory = cat; showCategoryModal = true" class="text-slate-900 dark:text-white font-bold hover:underline text-sm hover:underline">编辑</button>
                                            <button @click="deleteCategory(cat.id)" class="text-red-500 text-sm hover:underline">删除</button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                        <div class="bg-white dark:bg-[#09090B] rounded-xl border border-slate-200 dark:border-zinc-800">

                                <h3 class="font-semibold">标签管理</h3>
                                <button @click="showTagModal = true; editingTag = null" 
                                    class="px-4 py-2 bg-black dark:bg-white text-white dark:text-black font-bold rounded-lg hover:opacity-80 text-sm">+ 添加标签</button>
                            </div>
                            <div class="p-4 flex flex-wrap gap-2">
                                <template x-for="tag in tags" :key="tag.id">
                                    <div class="group relative">
                                        <span class="px-3 py-1 bg-slate-100 rounded text-sm" x-text="tag.name"></span>
                                        <div class="hidden group-hover:flex absolute -top-2 -right-2 gap-1">
                                            <button @click="editingTag = tag; showTagModal = true" class="w-5 h-5 bg-black dark:bg-white text-white dark:text-black font-bold rounded-full hover:opacity-80 text-xs">✎</button>
                                            <button @click="deleteTag(tag.id)" class="w-5 h-5 bg-red-500 text-white rounded-full text-xs">×</button>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </div>
                </template>

                <template x-if="currentPage === 'media'">
                    <div x-init="loadMedia()">
                        <div class="mb-4 flex justify-between items-center">
                            <div class="flex gap-2">
                                <button @click="filterMediaType = 'image'" 
                                    :class="filterMediaType === 'image' ? 'bg-black dark:bg-white text-white dark:text-black font-bold border border-black dark:border-white' : 'border border-slate-200'"
                                    class="px-4 py-2 rounded">图片</button>
                                <button @click="filterMediaType = 'file'" 
                                    :class="filterMediaType === 'file' ? 'bg-black dark:bg-white text-white dark:text-black font-bold border border-black dark:border-white' : 'border border-slate-200'"
                                    class="px-4 py-2 rounded">文件</button>
                                <button @click="filterMediaType = ''" 
                                    :class="filterMediaType === '' ? 'bg-black dark:bg-white text-white dark:text-black font-bold border border-black dark:border-white' : 'border border-slate-200'"
                                    class="px-4 py-2 rounded">全部</button>
                            </div>
                            <label class="px-4 py-2 bg-black dark:bg-white text-white dark:text-black font-bold rounded-lg hover:opacity-80 cursor-pointer hover:opacity-60 transition">

                                <input type="file" class="hidden" @change="uploadFile($event)">

                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">

                                <div class="bg-white dark:bg-[#09090B] rounded-xl border border-slate-200 dark:border-zinc-800 overflow-hidden group">

                                            <svg class="w-12 h-12 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                                            </svg>
                                        </template>
                                    </div>
                                    <div class="p-2">
                                        <p class="text-sm truncate" x-text="item.name"></p>
                                        <div class="flex justify-between items-center mt-1">
                                            <span class="text-xs text-slate-400" x-text="formatSize(item.size)"></span>
                                            <div class="flex gap-2">
                                                <button @click="copyToClipboard(item.url)" class="text-xs text-slate-500 hover:text-black dark:hover:text-white font-medium" x-text="copiedMediaUrl === item.url ? '已复制' : '复制'"></button>
                                                <button @click="deleteMedia(item.id)" class="text-red-500 text-xs hover:underline">删除</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>

                <template x-if="currentPage === 'themes'">
                    <div x-data="{ themeMsg: '' }" x-init="loadThemes()">
                        <div x-show="themeMsg" x-text="themeMsg" x-transition
                            class="mb-4 px-4 py-2 bg-green-50 dark:bg-green-900/20 text-green-700 dark:text-green-300 rounded-lg text-sm font-medium border border-green-200 dark:border-green-800"></div>
                        <div class="mb-4">
                            <label class="px-4 py-2 bg-black dark:bg-white text-white dark:text-black font-bold rounded-lg hover:opacity-80 cursor-pointer hover:opacity-60 transition">
                                上传主题
                                <input type="file" accept=".zip" class="hidden" @change="uploadTheme($event)">
                            </label>
                        </div>
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
                            <template x-for="theme in themes" :key="theme.id">
                                <div class="bg-white dark:bg-[#09090B] rounded-xl border border-slate-200 dark:border-zinc-800 overflow-hidden"
                                    :class="{ 'ring-2 ring-black dark:ring-white': theme.is_active }">

                                        <span class="text-2xl font-bold text-slate-300 dark:text-zinc-600" x-text="theme.name.charAt(0)"></span>
                                    </div>
                                    <div class="p-4">
                                        <div class="flex justify-between items-start mb-2">
                                            <h4 class="font-medium" x-text="theme.name"></h4>

                                                <span x-show="theme.is_active" class="text-xs px-2 py-0.5 bg-black dark:bg-white text-white dark:text-black font-bold rounded-lg">当前</span>
                                                <span x-show="theme.slug === 'default'" class="text-xs px-2 py-0.5 bg-slate-100 dark:bg-zinc-800 text-slate-500 dark:text-slate-400 rounded-lg font-medium">内置</span>

                                        <p class="text-sm text-slate-500 dark:text-slate-400 mb-2" x-text="theme.description"></p>
