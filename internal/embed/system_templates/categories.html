<div class="max-w-3xl mx-auto py-8">
    <div class="mb-16">
        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 dark:text-white mb-4 tracking-tight">分类</h1>
        <p class="text-lg md:text-xl text-slate-600 dark:text-slate-400 font-medium">探索所有主题</p>
    </div>

    {{if .categories}}
    <div class="space-y-6">
        {{range .categories}}
        <a href="/category/{{.Slug}}" class="group flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-6 bg-white dark:bg-[#18181B] border border-slate-200 dark:border-zinc-800 rounded-2xl sm:hover:-translate-y-0.5 hover:border-black dark:hover:border-white transition-all hover:shadow-xl shadow-sm">
            <div>
                <h3 class="text-xl font-bold text-slate-900 dark:text-white group-hover:underline decoration-2 underline-offset-4 mb-2">{{.Name}}</h3>
                {{if .Description}}
                <p class="text-slate-500 dark:text-slate-400 font-medium">{{.Description}}</p>
                {{end}}
            </div>
            <div class="flex items-center gap-4 shrink-0">
                <span class="text-sm font-mono font-medium text-slate-400 dark:text-slate-500 bg-slate-100 dark:bg-zinc-800 px-3 py-1 rounded-full group-hover:bg-black group-hover:text-white dark:group-hover:bg-white dark:group-hover:text-black transition-colors">{{.PostCount}} 篇</span>
                <svg class="w-5 h-5 text-slate-300 dark:text-slate-600 group-hover:text-black dark:group-hover:text-white transform transition-transform group-hover:translate-x-1" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
            </div>
        </a>
        {{end}}
    </div>
    {{else}}
    <div class="text-center py-20">
        <div class="w-20 h-20 bg-slate-100 dark:bg-[#18181B] rounded-full flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
        </div>
        <p class="text-xl font-semibold text-slate-900 dark:text-white mb-2">暂无分类</p>
        <p class="text-slate-500 dark:text-slate-400">目前还没有添加任何分类。</p>
    </div>
    {{end}}
</div>
